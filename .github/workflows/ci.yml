name: Enterprise QE Academy CI

on:
  push:
  pull_request:

jobs:
  validate-catalog-and-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: python scripts/validate_catalog.py
      - run: python scripts/validate_practice_assets.py
      - run: python scripts/practice_pipeline.py --domain Banking --role "Lead Quality Engineer" --difficulty Hard --count 3 --prompt-mode all --include-pack --include-solutions
      - run: python scripts/generate_practice_html.py --report latest
      - run: cd java/core && mvn clean test
